<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Token 用量统计</title>
  <meta name="description" content="OpenClaw Gateway LLM Token 用量统计仪表盘" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <script>
    (function () {
      try {
        var m = localStorage.getItem('openclaw-theme') || 'system';
        var dark = m === 'dark' || (m === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.add(dark ? 'theme-dark' : 'theme-light');
        document.documentElement.dataset.themeMode = m;
        document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
      } catch (e) {
        document.documentElement.classList.add('theme-light');
      }
    })();
  </script>
  <script src="/src/theme.js"></script>
</head>
<body data-i18n-title-key="common.appName">
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">🦞</div>
        <div>
          <h1 data-i18n="common.appName">OpenClaw Token Stats</h1>
          <p class="subtitle" data-i18n="dashboard.subtitle">Gateway LLM 用量统计仪表盘</p>
        </div>
      </div>
      <div class="header-right">
        <div class="locale-switch" role="group" aria-label="语言" data-i18n-attr="aria-label:common.languageGroup">
          <button type="button" data-locale-control="zh-CN" title="中文" aria-label="中文">中</button>
          <button type="button" data-locale-control="en-US" title="English" aria-label="English">EN</button>
        </div>
        <div class="theme-switch" role="group" aria-label="主题">
          <button type="button" data-theme-control="light" title="浅色">🌞</button>
          <button type="button" data-theme-control="dark" title="深色">🌙</button>
          <button type="button" data-theme-control="system" title="跟随系统">💻</button>
        </div>
        <a href="/pricing.html" class="btn-pricing" title="配置价格" data-i18n-attr="title:common.pricingConfig">
          💰 价格配置
        </a>
        <span id="generated-at" class="generated-at"></span>
        <button id="refresh-btn" class="btn-refresh" title="刷新数据" data-i18n-attr="title:common.refreshData">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Loading -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p data-i18n="common.loadingSessions">正在扫描 Session 文件...</p>
    </div>

    <!-- Main Content -->
    <main id="main-content" class="main-content" style="display:none;">

      <!-- Time Filter Bar -->
      <section class="time-filter-bar glass-card" id="time-filter-bar">
        <div class="time-presets">
          <button class="time-btn active" data-range="today" data-i18n="dashboard.rangeToday">今天</button>
          <button class="time-btn" data-range="yesterday" data-i18n="dashboard.rangeYesterday">昨天</button>
          <button class="time-btn" data-range="7d" data-i18n="dashboard.range7d">最近 7 天</button>
          <button class="time-btn" data-range="30d" data-i18n="dashboard.range30d">最近 30 天</button>
          <button class="time-btn" data-range="this-month" data-i18n="dashboard.rangeThisMonth">本月</button>
          <button class="time-btn" data-range="last-month" data-i18n="dashboard.rangeLastMonth">上月</button>
          <button class="time-btn" data-range="all" data-i18n="dashboard.rangeAll">全部</button>
        </div>
        <div class="time-custom">
          <input type="date" id="date-from" class="date-input" />
          <span class="date-sep">—</span>
          <input type="date" id="date-to" class="date-input" />
        </div>
      </section>

      <!-- Summary Cards -->
      <section class="summary-cards" id="summary-cards"></section>

      <!-- Charts Row -->
      <section class="charts-section">
        <div class="chart-container glass-card">
          <h3 data-i18n="dashboard.chartTimeline">📈 Token 用量趋势（按日）</h3>
          <canvas id="chart-timeline"></canvas>
        </div>
        <div class="chart-container glass-card">
          <h3 data-i18n="dashboard.chartProvider">🧩 Provider 费用分布</h3>
          <canvas id="chart-provider"></canvas>
        </div>
      </section>

      <!-- Model comparison -->
      <section class="charts-section">
        <div class="chart-container chart-wide glass-card">
          <div class="chart-title-row">
            <h3 data-i18n="dashboard.chartModel">🤖 Model 用量对比</h3>
            <label class="log-toggle">
              <input type="checkbox" id="model-log-scale" />
              <span data-i18n="dashboard.logScale">对数坐标</span>
            </label>
          </div>
          <canvas id="chart-model"></canvas>
        </div>
      </section>

      <!-- Sessions Table -->
      <section class="table-section glass-card">
        <div class="table-header">
          <h3 data-i18n="dashboard.sessionDetails">📋 Session 明细</h3>
          <div class="table-controls">
            <select id="status-filter" class="select-filter">
              <option value="all" data-i18n="dashboard.allStatus">全部状态</option>
              <option value="active">🟢 Active</option>
              <option value="reset">🔄 Reset</option>
              <option value="deleted">🗑️ Deleted</option>
            </select>
            <input type="text" id="search-input" class="search-input" placeholder="搜索 Session ID / Provider / Model..." data-i18n-attr="placeholder:dashboard.searchPlaceholder" />
          </div>
        </div>
        <div class="table-wrapper">
          <table id="sessions-table">
            <thead>
              <tr>
                <th data-sort="status" data-i18n="dashboard.tableStatus">状态</th>
                <th data-sort="id" data-i18n="dashboard.tableSessionId">Session ID</th>
                <th data-sort="providers" data-i18n="dashboard.tableProvider">Provider</th>
                <th data-sort="models" data-i18n="dashboard.tableModel">Model</th>
                <th data-sort="totalTokens" data-i18n="dashboard.tableTotalTokens">Total Tokens</th>
                <th data-sort="totalInput" data-i18n="dashboard.tableInput">Input</th>
                <th data-sort="totalOutput" data-i18n="dashboard.tableOutput">Output</th>
                <th data-sort="totalCost" data-i18n="dashboard.tableCost">费用 ($)</th>
                <th data-sort="requestCount" data-i18n="dashboard.tableRequests">请求数</th>
                <th data-sort="lastTimestamp" data-i18n="dashboard.tableLastActive">最后活跃</th>
              </tr>
            </thead>
            <tbody id="sessions-tbody"></tbody>
          </table>
        </div>
        <!-- Pagination -->
        <div class="pagination" id="pagination">
          <div class="pagination-info" id="pagination-info"></div>
          <div class="pagination-controls">
            <div class="page-size-selector">
              <span data-i18n="dashboard.perPage">每页</span>
              <select id="page-size" class="select-filter">
                <option value="10" selected>10</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
              <span data-i18n="dashboard.rows">条</span>
            </div>
            <div class="page-buttons" id="page-buttons"></div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
