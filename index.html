<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Token 用量统计</title>
  <meta name="description" content="OpenClaw Gateway LLM Token 用量统计仪表盘" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">🦞</div>
        <div>
          <h1>OpenClaw Token Stats</h1>
          <p class="subtitle">Gateway LLM 用量统计仪表盘</p>
        </div>
      </div>
      <div class="header-right">
        <span id="generated-at" class="generated-at"></span>
        <button id="refresh-btn" class="btn-refresh" title="刷新数据">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Loading -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>正在扫描 Session 文件...</p>
    </div>

    <!-- Main Content -->
    <main id="main-content" class="main-content" style="display:none;">

      <!-- Time Filter Bar -->
      <section class="time-filter-bar glass-card" id="time-filter-bar">
        <div class="time-presets">
          <button class="time-btn active" data-range="today">今天</button>
          <button class="time-btn" data-range="yesterday">昨天</button>
          <button class="time-btn" data-range="7d">最近 7 天</button>
          <button class="time-btn" data-range="30d">最近 30 天</button>
          <button class="time-btn" data-range="this-month">本月</button>
          <button class="time-btn" data-range="last-month">上月</button>
          <button class="time-btn" data-range="all">全部</button>
        </div>
        <div class="time-custom">
          <input type="date" id="date-from" class="date-input" />
          <span class="date-sep">—</span>
          <input type="date" id="date-to" class="date-input" />
        </div>
      </section>

      <!-- Summary Cards -->
      <section class="summary-cards" id="summary-cards"></section>

      <!-- Charts Row -->
      <section class="charts-section">
        <div class="chart-container glass-card">
          <h3>📈 Token 用量趋势（按日）</h3>
          <canvas id="chart-timeline"></canvas>
        </div>
        <div class="chart-container glass-card">
          <h3>🧩 Provider 费用分布</h3>
          <canvas id="chart-provider"></canvas>
        </div>
      </section>

      <!-- Model comparison -->
      <section class="charts-section">
        <div class="chart-container chart-wide glass-card">
          <div class="chart-title-row">
            <h3>🤖 Model 用量对比</h3>
            <label class="log-toggle">
              <input type="checkbox" id="model-log-scale" />
              <span>对数坐标</span>
            </label>
          </div>
          <canvas id="chart-model"></canvas>
        </div>
      </section>

      <!-- Sessions Table -->
      <section class="table-section glass-card">
        <div class="table-header">
          <h3>📋 Session 明细</h3>
          <div class="table-controls">
            <select id="status-filter" class="select-filter">
              <option value="all">全部状态</option>
              <option value="active">🟢 Active</option>
              <option value="reset">🔄 Reset</option>
              <option value="deleted">🗑️ Deleted</option>
            </select>
            <input type="text" id="search-input" class="search-input" placeholder="搜索 Session ID / Provider / Model..." />
          </div>
        </div>
        <div class="table-wrapper">
          <table id="sessions-table">
            <thead>
              <tr>
                <th data-sort="status">状态</th>
                <th data-sort="id">Session ID</th>
                <th data-sort="providers">Provider</th>
                <th data-sort="models">Model</th>
                <th data-sort="totalTokens">Total Tokens</th>
                <th data-sort="totalInput">Input</th>
                <th data-sort="totalOutput">Output</th>
                <th data-sort="totalCost">费用 ($)</th>
                <th data-sort="requestCount">请求数</th>
                <th data-sort="lastTimestamp">最后活跃</th>
              </tr>
            </thead>
            <tbody id="sessions-tbody"></tbody>
          </table>
        </div>
        <!-- Pagination -->
        <div class="pagination" id="pagination">
          <div class="pagination-info" id="pagination-info"></div>
          <div class="pagination-controls">
            <div class="page-size-selector">
              <span>每页</span>
              <select id="page-size" class="select-filter">
                <option value="10" selected>10</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
              <span>条</span>
            </div>
            <div class="page-buttons" id="page-buttons"></div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
